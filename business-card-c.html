<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Card C — Grace Dougan Consulting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #B8975A;
      --gold-light: #D4AF72;
      --dark: #111111;
      --cream: #FAF8F4;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Montserrat', Arial, sans-serif;
      --card-size: 720px;
      /* 0.25" margin: card = 2.5", so 0.25/2.5 × 720 = 72px */
      --margin: 72px;
    }
    body {
      background: #2a2a2a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 60px 40px;
      font-family: var(--font-sans);
    }
    .label { color: #888; font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; text-align: center; margin-bottom: 16px; }
    .card-wrap { display: flex; flex-direction: column; align-items: center; }
    .card { width: var(--card-size); height: var(--card-size); position: relative; overflow: hidden; }

    /* ══ FRONT — Solid gold, square monogram, white type ══ */
    .card--front {
      background: var(--gold);
    }

    /* Corner frame dots — white */
    .front__dot {
      position: absolute;
      width: 5px; height: 5px;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      z-index: 3;
    }
    .front__dot--tl { top: 16px;  left: 16px; }
    .front__dot--tr { top: 16px;  right: 16px; }
    .front__dot--bl { bottom: 16px; left: 16px; }
    .front__dot--br { bottom: 16px; right: 16px; }

    /* Thin white border frame */
    .front__frame {
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(255,255,255,0.35);
      z-index: 2;
    }

    .front__inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 4;
      gap: 0;
    }

    /* Square SVG monogram rendered via inline SVG */
    .front__mark {
      margin-bottom: 22px;
    }

    .front__rule {
      width: 260px;
      height: 1px;
      background: rgba(255,255,255,0.35);
      margin: 0 0 20px;
    }

    .front__name {
      font-family: var(--font-serif);
      font-size: 36px;
      font-weight: 300;
      color: #fff;
      letter-spacing: 0.12em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .front__company {
      font-family: var(--font-sans);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.36em;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
    }

    .front__bottom {
      position: absolute;
      bottom: 36px;
      left: 0; right: 0;
      text-align: center;
      font-family: var(--font-sans);
      font-size: 7.5px;
      font-weight: 400;
      letter-spacing: 0.32em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    /* ══ BACK — White, 0.25" margins, content fills the space ══ */
    .card--back {
      background: #fff;
    }

    .back__inner {
      position: absolute;
      inset: var(--margin);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .back__mark { margin-bottom: 14px; }

    .back__name {
      font-family: var(--font-serif);
      font-size: 36px;
      font-weight: 400;
      color: var(--dark);
      line-height: 1;
      margin-bottom: 5px;
    }
    .back__title {
      font-family: var(--font-serif);
      font-size: 13px;
      font-style: italic;
      color: var(--gold);
      letter-spacing: 0.02em;
      margin-bottom: 28px;
    }

    .back__divider {
      width: 36px;
      height: 2px;
      background: var(--gold);
      margin-bottom: 28px;
    }

    .back__contact {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }
    .back__contact-line {
      font-family: var(--font-sans);
      font-size: 11.5px;
      color: #555;
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1;
    }
    .back__contact-label {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--gold);
      text-transform: uppercase;
      width: 12px;
      flex-shrink: 0;
    }
    .back__location {
      font-family: var(--font-sans);
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: #bbb;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .print-btn { font-family:var(--font-sans); font-size:10px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; background:var(--gold); color:#fff; border:none; padding:12px 28px; cursor:pointer; margin-top:20px; }
    .print-btn:hover { background:#fff; color:var(--dark); }
    .print-note { color:#666; font-size:10px; letter-spacing:0.08em; text-align:center; margin-top:12px; }

    @media print {
      body { background:white; padding:0; gap:0; }
      .label,.print-btn,.print-note { display:none; }
      .card--front { page-break-after:always; }
    }
  </style>
</head>
<body>

  <!-- FRONT -->
  <div class="card-wrap">
    <p class="label">Design C — Front · Gold</p>
    <div class="card card--front">
      <div class="front__frame"></div>
      <div class="front__dot front__dot--tl"></div>
      <div class="front__dot front__dot--tr"></div>
      <div class="front__dot front__dot--bl"></div>
      <div class="front__dot front__dot--br"></div>

      <div class="front__inner">
        <div class="front__mark">
          <svg width="140" height="140" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="6" width="108" height="108" stroke="rgba(255,255,255,0.75)" stroke-width="1.5"/>
            <rect x="14" y="14" width="92" height="92" stroke="rgba(255,255,255,0.35)" stroke-width="0.7" stroke-dasharray="3 3"/>
            <text x="60" y="70" text-anchor="middle"
              font-family="Cormorant Garamond, Georgia, serif"
              font-size="32" font-weight="400" fill="white" letter-spacing="5">GDC</text>
          </svg>
        </div>

        <div class="front__rule"></div>

        <div class="front__name">Grace Dougan</div>
        <div class="front__company">Consulting</div>
      </div>

      <div class="front__bottom">Bay Area · Est. 2010</div>
    </div>
  </div>

  <!-- BACK -->
  <div class="card-wrap">
    <p class="label">Design C — Back · 0.25″ Margin</p>
    <div class="card card--back">
      <div class="back__inner">

        <div class="back__mark">
          <svg width="52" height="52" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="6" width="108" height="108" stroke="#B8975A" stroke-width="1.5"/>
            <rect x="14" y="14" width="92" height="92" stroke="#B8975A" stroke-width="0.6" stroke-dasharray="3 3"/>
            <text x="60" y="70" text-anchor="middle"
              font-family="Cormorant Garamond, Georgia, serif"
              font-size="32" font-weight="400" fill="#B8975A" letter-spacing="5">GDC</text>
          </svg>
        </div>
        <div class="back__name">Grace Dougan</div>
        <div class="back__title">Founder &amp; Principal</div>

        <div class="back__divider"></div>

        <div class="back__contact">
          <div class="back__contact-line">
            <span class="back__contact-label">P</span>415.827.9648
          </div>
          <div class="back__contact-line">
            <span class="back__contact-label">E</span>grace@gracedouganconsulting.com
          </div>
          <div class="back__contact-line">
            <span class="back__contact-label">W</span>gracedouganconsulting.com
          </div>
          <div class="back__location">Bay Area, California</div>
        </div>

      </div>
    </div>
  </div>

  <div style="text-align:center;">
    <button class="print-btn" onclick="window.print()">Save as PDF / Print</button>
    <p class="print-note">Square 2.5″ × 2.5″ · Print at 100% scale</p>
  </div>

</body>
</html>
