<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Card C — Grace Dougan Consulting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #B8975A;
      --gold-light: #D4AF72;
      --dark: #111111;
      --cream: #FAF8F4;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Montserrat', Arial, sans-serif;
      --card-size: 720px;
    }
    body {
      background: #2a2a2a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 60px 40px;
      font-family: var(--font-sans);
    }
    .label { color: #888; font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; text-align: center; margin-bottom: 16px; }
    .card-wrap { display: flex; flex-direction: column; align-items: center; }
    .card { width: var(--card-size); height: var(--card-size); position: relative; overflow: hidden; }

    /* ══ DESIGN C FRONT — Full gold border frame, centered stacked type ══ */
    .card--front {
      background: #0d0d0d;
    }

    /* Radiating glow from center */
    .card--front::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(184,151,90,0.10) 0%, transparent 70%);
    }

    /* Outer thin gold frame */
    .front__frame-outer {
      position: absolute;
      inset: 18px;
      border: 1.5px solid rgba(184,151,90,0.35);
    }

    /* Inner thick gold frame */
    .front__frame-inner {
      position: absolute;
      inset: 30px;
      border: 0.5px solid rgba(184,151,90,0.15);
    }

    /* Tiny gold dots at each corner of outer frame */
    .front__dot {
      position: absolute;
      width: 5px; height: 5px;
      background: var(--gold);
      border-radius: 50%;
    }
    .front__dot--tl { top: 16px;  left: 16px; }
    .front__dot--tr { top: 16px;  right: 16px; }
    .front__dot--bl { bottom: 16px; left: 16px; }
    .front__dot--br { bottom: 16px; right: 16px; }

    .front__inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
      gap: 0;
    }

    /* Large "G" initial only — single letter statement */
    .front__eyebrow {
      font-family: var(--font-sans);
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.42em;
      color: rgba(184,151,90,0.5);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .front__initial {
      font-family: var(--font-serif);
      font-size: 260px;
      font-weight: 300;
      line-height: 0.82;
      color: var(--gold);
      opacity: 0.18;
      position: absolute;
      user-select: none;
      pointer-events: none;
    }

    .front__monogram-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .front__gdc {
      font-family: var(--font-serif);
      font-size: 78px;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 22px;
      padding-left: 22px;
      line-height: 1;
    }

    .front__rule-full {
      width: 320px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(184,151,90,0.4) 30%, rgba(184,151,90,0.4) 70%, transparent);
      margin: 14px 0;
    }

    .front__fullname {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .front__bottom {
      position: absolute;
      bottom: 44px;
      left: 0; right: 0;
      text-align: center;
      font-family: var(--font-sans);
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 0.38em;
      color: rgba(184,151,90,0.3);
      text-transform: uppercase;
    }

    /* ══ DESIGN C BACK — Cream, very minimal ══ */
    .card--back {
      background: #fff;
    }

    /* Single thick gold left bar */
    .back__bar {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 6px;
      background: var(--gold);
    }

    .back__inner {
      position: absolute;
      top: 0; left: 6px; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 52px 60px 56px;
    }

    .back__mark {
      width: 44px; height: 44px;
      border: 1.5px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      position: relative;
      flex-shrink: 0;
    }
    .back__mark::after {
      content: '';
      position: absolute;
      inset: 5px;
      border: 0.7px dashed rgba(184,151,90,0.5);
    }
    .back__mark-text {
      font-family: var(--font-serif);
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 2.5px;
      padding-left: 2.5px;
      position: relative;
    }

    .back__name {
      font-family: var(--font-serif);
      font-size: 34px;
      font-weight: 400;
      color: var(--dark);
      line-height: 1;
      margin-bottom: 3px;
    }
    .back__title {
      font-family: var(--font-serif);
      font-size: 13px;
      font-style: italic;
      color: var(--gold);
      margin-bottom: 24px;
    }

    .back__divider { width: 32px; height: 1.5px; background: var(--gold); margin-bottom: 20px; }

    .back__contact { display: flex; flex-direction: column; gap: 7px; }
    .back__contact-line {
      font-family: var(--font-sans);
      font-size: 10.5px;
      color: #666;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back__contact-line b { color: var(--gold); font-weight: 500; font-size: 9px; letter-spacing: 0.12em; width: 10px; }

    .print-btn { font-family:var(--font-sans); font-size:10px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; background:var(--gold); color:#fff; border:none; padding:12px 28px; cursor:pointer; margin-top:20px; }
    .print-btn:hover { background:#fff; color:var(--dark); }
    .print-note { color:#666; font-size:10px; letter-spacing:0.08em; text-align:center; margin-top:12px; }

    @media print {
      body { background:white; padding:0; gap:0; }
      .label,.print-btn,.print-note { display:none; }
      .card--front { page-break-after:always; }
    }
  </style>
</head>
<body>

  <!-- FRONT -->
  <div class="card-wrap">
    <p class="label">Design C — Front · Full-Name Stacked Type</p>
    <div class="card card--front">
      <div class="front__frame-outer"></div>
      <div class="front__frame-inner"></div>
      <div class="front__dot front__dot--tl"></div>
      <div class="front__dot front__dot--tr"></div>
      <div class="front__dot front__dot--bl"></div>
      <div class="front__dot front__dot--br"></div>

      <div class="front__inner">
        <div class="front__monogram-block">
          <div class="front__eyebrow">Grace Dougan</div>
          <div class="front__gdc">GDC</div>
          <div class="front__rule-full"></div>
          <div class="front__fullname">Consulting</div>
        </div>
      </div>

      <div class="front__bottom">Bay Area · Est. 2010</div>
    </div>
  </div>

  <!-- BACK -->
  <div class="card-wrap">
    <p class="label">Design C — Back · Left Gold Bar</p>
    <div class="card card--back">
      <div class="back__bar"></div>
      <div class="back__inner">
        <div class="back__mark">
          <span class="back__mark-text">GDC</span>
        </div>
        <div class="back__name">Grace Dougan</div>
        <div class="back__title">Founder &amp; Principal</div>
        <div class="back__divider"></div>
        <div class="back__contact">
          <div class="back__contact-line"><b>P</b>415.827.9648</div>
          <div class="back__contact-line"><b>E</b>grace@gracedouganconsulting.com</div>
          <div class="back__contact-line"><b>W</b>gracedouganconsulting.com</div>
          <div class="back__contact-line" style="margin-top:4px; font-size:9px; letter-spacing:0.16em; color:#bbb; text-transform:uppercase;">Bay Area, California</div>
        </div>
      </div>
    </div>
  </div>

  <div style="text-align:center;">
    <button class="print-btn" onclick="window.print()">Save as PDF / Print</button>
    <p class="print-note">Square 2.5″ × 2.5″ · Print at 100% scale</p>
  </div>

</body>
</html>
